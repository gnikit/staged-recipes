# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.0"

package:
  name: ast-serialize
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/ast-serialize/ast_serialize-${{ version }}.tar.gz
  sha256: 1bc3ca09a63a021376527c4e938deedd11d11d675ce850e6f9c7487f5889992b

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler("rust") }}
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - cargo-bundle-licenses
  host:
    - maturin >=1.9,<2.0
    - pip
    - python
  run:
    - python

tests:
  - python:
      imports: ast_serialize
      pip_check: true

about:
  summary: Python bindings for mypy AST serialization
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://pypi.org/project/ast-serialize
  repository: https://github.com/mypyc/ast_serialize

extra:
  recipe-maintainers:
    - conda-forge/mypy
    - bollwyvl
