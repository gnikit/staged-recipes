schema_version: 1

context:
  version: "1.1.0"
  python_min: "3.10"

package:
  name: bpcmp
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/bpcmp/bpcmp-${{ version }}.tar.gz
  sha256: 887b82dc2d6d982ac38d36f295c5c5ed2d2d28cf6f3461ca56934b8fb072ffd6
  patches:
    - remove-setuptools-scm.patch

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - bpcmp = bpcmp.bpcmp:main
      - bpdump = bpcmp.bpdump:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - setuptools-scm >=6.2
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - adios2
    - termcolor

tests:
  - python:
      imports:
        - bpcmp
      # adios2 does not install Python dist-info metadata, so 'pip check'
      # views adios2 as missing even though 'import adios2' works.
      pip_check: false
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - bpcmp --help
      - bpdump --help

about:
  summary: Comparison tool for ADIOS2 bp output
  license: GPL-3.0-or-later
  license_file: LICENSE
  homepage: https://github.com/PrincetonUniversity/bpcmp
  repository: https://github.com/PrincetonUniversity/bpcmp

extra:
  recipe-maintainers:
    - jsachdev
    - matthewfeickert
