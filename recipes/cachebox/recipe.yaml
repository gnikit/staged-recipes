schema_version: 1

context:
  version: "5.2.3"

package:
  version: ${{ version }}

source:
  url:   sha256: b1f68246685aa739bbbd2734befb1465363a1e1042407c154feadb065f17a099

build:
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1.8,<2
    - ${{ compiler("c") }}
    - ${{ compiler("rust") }}
    - ${{ stdlib("c") }}
    - cargo-bundle-licenses
  host:
    - python
    - maturin >=1.8,<2.0
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - cachebox
      pip_check: true

about:
  summary: The fastest caching Python library written in Rust
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://github.com/awolverp/cachebox
  repository: https://github.com/awolverp/cachebox

extra:
  recipe-maintainers:
    - synapticarbors
