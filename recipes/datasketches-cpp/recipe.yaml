context:
  version: "5.2.0"

package:
  name: datasketches-cpp
  version: ${{ version }}

source:
  url: https://github.com/apache/datasketches-cpp/archive/refs/tags/${{ version }}.tar.gz
  sha256: 63e6bda660ee9730cc39746de87fd983118c28149e32ff9389fac98b27010a53

build:
  # this is a header only library
  noarch: generic
  number: 0

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
  host:
  run:
    - if: unix
      then: __unix
      else: __win

tests:
  - package_contents:
      include:
        - DataSketches/version.hpp

about:
  homepage: https://datasketches.apache.org
  summary: 'A software library of stochastic streaming algorithms'
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://datasketches.apache.org/docs/Background/TheChallenge.html
  repository: https://github.com/apache/datasketches-cpp

extra:
  recipe-maintainers:
    - isuruf
