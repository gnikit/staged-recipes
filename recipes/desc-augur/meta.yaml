{% set name = "desc-augur" %}
{% set version = "1.2.2" %}
{% set python_min = "3.9" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "github.com{{ name }}/archive/v{{ version }}.tar.gz"
  sha256: "paste_your_computed_sha256_hash_here"

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv"

requirements:
  host:
    - python {{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - astropy-base
    - firecrown >=1.14  # Primary structural dependency for LSSTDESC Augur
    - matplotlib-base

test:
  imports:
    - augur
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: "https://github.com/LSSTDESC/augur"
  license: MIT
  license_file: LICENSE
  summary: "A DESC forecasting tool wrapping firecrown."
  description: |
    Augur is a wrapper to firecrown that generates synthetic datasets of 
    arbitrary complexity and calls an inference engine to generate full MCMC 
    or a simple second-order derivative at a fiducial model to generate 
    a Fisher matrix forecast.

extra:
  recipe-maintainers:
    - fjaviersanchez
