context:
  version: "1.7.0"
  build: 0

recipe:
  name: dpct-meta
  version: ${{ version }}

source:
  url: https://github.com/ilastik/dpct/archive/${{ version }}.tar.gz
  sha256: 22fad6f5368974a57cd68c3287843f4937a7207ed552a970ef2f7d0c07c7091a

build:
  number: ${{ build }}

outputs:
  - package:
      name: libdpct
      version: ${{ version }}

    build:
      number: ${{ build }}
      script:
        - if: not win
          then: ${RECIPE_DIR}/build.sh
          else: "%RECIPE_DIR%\\build.bat"

    requirements:
      build:
        - cmake
        - if: not win
          then:
            - make
        - ${{ compiler("c") }}
        - ${{ compiler("cxx") }}
      host:
        - jsoncpp
        - lemon
      run_exports:
        weak:
          - ${{ pin_subpackage("libdpct", exact=True) }}

    tests:
      - package_contents:
          include:
            - dpct/*.h
          lib:
            - dpct

      - script:
        - cmake-package-check dpct --targets dpct::dpct
        requirements:
          run:
            - cmake-package-check
            - ${{ compiler("c") }}
            - ${{ compiler("cxx") }}


  - package:
      name: dpct
      version: ${{ version }}

    build:
      number: ${{ build }}
      script:
        - if: not win
          then: ${RECIPE_DIR}/build-python.sh
          else: "%RECIPE_DIR%\\build-python.bat"

    requirements:
      build:
        - if: build_platform != target_platform
          then:
            - cross-python_${{ target_platform }}
            - python
            - cython
        - cmake
        - if: not win
          then:
            - make
        - ${{ compiler("c") }}
        - ${{ compiler("cxx") }}
      host:
        - pybind11
        - lemon
        - python
        - ${{ pin_subpackage("libdpct", exact=True) }}
      run:
        - python
        - ${{ pin_subpackage("libdpct", upper_bound="x.x") }}

    tests:
      - script:
          - python test/test.py
        files:
          source:
            - test/*.py
            - test/*.json

      - python:
          imports:
            - dpct

about:
  homepage: https://github.com/ilastik/dpct
  license: MIT
  summary: Dynamic Programming Cell Tracking Solver Library
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - k-dominik
