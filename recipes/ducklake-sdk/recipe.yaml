context:
  name: ducklake-sdk
  version: "0.0.5"
  python_min: 3.10.*

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: bed8a46f955e712e407bb17c07ea552ca73c91d7a196fad17c3dc39e57557be7

build:
  number: 0
  skip: not (match(python, python_min) and is_abi3)
  python:
    version_independent: true

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - crossenv
        - maturin >=1.7,<2
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
  host:
    - python
    - python-abi3
    - pip
    - maturin >=1.7,<2
  run:
    - python
    - typing_extensions
  ignore_run_exports:
    from_package:
      - cross-python_${{ target_platform }}
  run_constraints:
    - polars >=1.40
    - sqlalchemy >=2

tests:
  - python:
      python_version: ${{ python_min }}
      imports:
        - ducklake
      pip_check: true

about:
  homepage: https://github.com/borchero/ducklake-sdk
  summary: Python SDK to interact with DuckLake.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://ducklake-sdk.readthedocs.io/
  repository: https://github.com/borchero/ducklake-sdk

extra:
  recipe-maintainers:
    - borchero
