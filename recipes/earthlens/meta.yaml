{% set name = "earthlens" %}
{% set version = "0.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f68aacf30428158d8bdc1a13e71666c419f360a14fdb1c2c56538e4ab986b5e9

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  number: 0

requirements:
  host:
    - python >=3.11,<4
    - pip
    - setuptools >=80
    - wheel
  run:
    - python >=3.11,<4
    - pyramids >=0.17.0
    - joblib >=1.2.0
    - loguru >=0.7.2
    - numpy >=2.1.3
    - pandas >=2.2.3
    - pyyaml >=6.0.2
    - pydantic >=2
    - requests >=2.28.1
    - tqdm >=4.66.0

test:
  imports:
    - earthlens
    - earthlens.aggregate
    - earthlens.base
    - earthlens.chirps
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/serapeum-org/earthlens
  summary: Remote sensing package for downloading satellite and climate data
  description: |
    earthlens is a Python package for downloading satellite and climate
    data from multiple sources, including CHIRPS rainfall (FTP), ERA5 on
    AWS S3, the ECMWF Climate Data Store via cdsapi, and Google Earth
    Engine. It provides a unified `EarthLens` facade that lazily loads
    each backend so the optional SDK for a backend you don't use never
    has to be installed.

    Optional backends can be enabled by additionally installing:

      * boto3 (for the ERA5-on-S3 backend)
      * cdsapi (for the ECMWF/CDS backend)
      * earthengine-api (for the Google Earth Engine backend)
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE.md
  doc_url: https://serapeum-org.github.io/earthlens/
  dev_url: https://github.com/serapeum-org/earthlens

extra:
  recipe-maintainers:
    - MAfarrag
