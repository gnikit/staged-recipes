schema_version: 1

context:
  name: mednet
  version: "0.1.3"
  python_min: 3.10

package:
  name: fairret
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fairret/fairret-${{ version }}.tar.gz
  sha256: e8684f362fd3da65080172ef43e80e50592d02d6e5855834707c9974056e08c3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - setuptools-scm >=8
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - pytorch
    - numpy

tests:
  - python:
      imports:
        - fairret
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A fairness library in PyTorch.
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/fairret/
  repository: https://github.com/aida-ugent/fairret
  documentation: https://aida-ugent.github.io/fairret/

extra:
  recipe-maintainers:
    - anjos
