schema_version: 1

context:
  python_min: "3.11"
  version: "0.9.2"

package:
  name: fremor
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fremor/fremor-${{ version }}.tar.gz
  sha256: a07a24211bb36db8d7a0db28bdc60c76dec334b64c7c94c50119d1219f2f5a0d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - fremor = fremor.cli:fremor

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - click
    - cmor
    - netcdf4
    - numpy
    - pyyaml

tests:
  - python:
      imports:
        - fremor
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - fremor --help

about:
  summary: Model output rewriter (CMORizer) for FRE/FMS based models
  license: Apache-2.0
  license_file: LICENSE.md
  homepage: https://pypi.org/project/fremor/

extra:
  recipe-maintainers:
    - ilaflott
