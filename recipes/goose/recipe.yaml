schema_version: 1

context:
  version: "1.34.1"

recipe:
  name: goose
  version: ${{ version }}

source:
  url: https://github.com/aaif-goose/goose/archive/refs/tags/v${{ version }}.tar.gz
  sha256: f8bb579750bb7dba3fd8685a27b4986f7caa2d629f6d80cd7879308dcf540c36

build:
  number: 0

about:
  homepage: https://goose-docs.ai
  documentation: https://goose-docs.ai/docs
  repository: https://github.com/aaif-goose/goose
  license: Apache-2.0

outputs:
  - package:
      name: goose-cli
      version: ${{ version }}
    build:
      script:
        - if: win
          then: pushd crates\goose-cli
          else: pushd crates/goose-cli
        - pushd crates/goose-cli
        - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
        - cargo install --no-track --locked --root ${{ PREFIX }} --path .
        - popd
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - ${{ compiler('rust') }}
        - ${{ 'protobuf' if linux }}
        - cargo-bundle-licenses
        - pkg-config
      host:
        - if: linux
          then:
            - dbus
            - libxcb
    tests:
      - script:
          - goose --version
          - goose --help
    about:
      license_file:
        - LICENSE
        - crates/goose-cli/THIRDPARTY.yml
      summary: 'An open source, extensible AI agent that goes beyond code suggestions - install, execute, edit, and test with any LLM'
      description: |
        goose is a general-purpose AI agent that runs on your machine.
        Not just for code — use it for research, writing, automation, data analysis, or anything you need to get done.

        goose works with 15+ providers — Anthropic, OpenAI, Google, Ollama, OpenRouter, Azure, Bedrock, and more.
        Use API keys or your existing Claude, ChatGPT, or Gemini subscriptions via [ACP](https://goose-docs.ai/docs/guides/acp-providers).
        Connect to 70+ extensions via the [Model Context Protocol](https://modelcontextprotocol.io/) open standard.

  - package:
      name: goose-server
      version: ${{ version }}
    build:
      script:
        - if: win
          then: pushd crates\goose-server
          else: pushd crates/goose-server
        - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
        - cargo install --no-track --locked --root ${{ PREFIX }} --path .
        - popd
    requirements:
          build:
            - ${{ compiler('c') }}
            - ${{ stdlib('c') }}
            - ${{ compiler('rust') }}
            - ${{ 'protobuf' if linux }}
            - cargo-bundle-licenses
            - pkg-config
          host:
            - if: linux
              then:
                - dbus
                - libxcb
    tests:
      - script:
          - goosed --version
          - goosed --help
    about:
      license_file:
        - LICENSE
        - crates/goose-server/THIRDPARTY.yml
      summary: 'HTTP server backend for the Goose AI agent'
      description: |
        goose is a general-purpose AI agent that runs on your machine.
        Not just for code — use it for research, writing, automation, data analysis, or anything you need to get done.

        goose-server provides the HTTP server backend (goosed) for the Goose AI agent,
        enabling desktop application integration and programmatic access to Goose capabilities.

extra:
  recipe-maintainers:
    - eunos-1128
