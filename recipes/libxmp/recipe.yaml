context:
  version: "4.7.0"

package:
  name: libxmp
  version: ${{ version }}

source:
  url: https://github.com/libxmp/libxmp/releases/download/libxmp-${{ version }}/libxmp-${{ version }}.tar.gz
  sha256: b6251de1859352c6988752563d60983cb8aa9fd7dfe9f81b8bc6688da47f3464

build:
  number: 0
  script: build
  run_exports:
    - ${{ pin_subpackage("libxmp", "x") }}

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - cmake
    - ninja

tests:
  - package_contents:
      lib:
        - xmp

about:
  homepage: https://github.com/libxmp/libxmp
  summary: 'Libxmp is a library that renders module files to PCM data.'
  license: MIT
  license_file: LICENSE.txt
  repository: https://github.com/libxmp/libxmp

extra:
  recipe-maintainers:
    - h-vetinari
