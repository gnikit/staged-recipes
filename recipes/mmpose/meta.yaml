{% set name = "mmpose" %}
{% set version = "1.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: 463df5a591b6cb351140f52a1a6a5e74d9182392d09b8e6bab1f471daca5a21f
  - url: https://raw.githubusercontent.com/open-mmlab/mmpose/v{{ version }}/LICENSE
    sha256: aa2c6f3408169b96e5547c875deb481c91502514c1885fa0acb4b596c8909cb9

build:
  number: 0
  skip: true  # [win or py>=312]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python
    - setuptools
    - numpy
    - pytorch >=1.8
  run:
    - chumpy
    - json_tricks
    - matplotlib-base
    - mmcv >=2.0.0,<3.0.0
    - mmengine >=0.4.0,<1.0.0
    - munkres
    - numpy
    - opencv
    - pillow
    - python
    - pytorch >=1.8
    - scipy
    - torchvision
    - xtcocotools >=1.12

test:
  imports:
    - mmpose
  requires:
    - mmcv * cpu_*  # [linux]
    - pytorch * cpu_*  # [linux]
    - torchvision * cpu_*  # [linux]

about:
  home: https://github.com/open-mmlab/mmpose
  summary: OpenMMLab Pose Estimation Toolbox and Benchmark
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jeongseok-meta
