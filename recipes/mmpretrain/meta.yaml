{% set name = "mmpretrain" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: bb3e975c62db8ca7d2d4a02ac63587c45ec067eeb0c4803e4a87aab8883ff19c
  patches:
    - model-index.patch

build:
  number: 0
  skip: true  # [win or py>=313]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - einops
    - importlib-metadata
    - mat4py
    - matplotlib-base
    - mmcv >=2.0.0,<2.4.0
    - mmengine >=0.8.3,<1.0.0
    - model-index
    - numpy
    - opencv
    - python
    - pytorch
    - rich

test:
  imports:
    - mmpretrain

about:
  home: https://github.com/open-mmlab/mmpretrain
  summary: OpenMMLab Pre-training Toolbox and Benchmark
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jeongseok-meta
