{% set version = "0.0.2" %}
{% set python_min = "3.10" %}

package:
  name: mt-timeseries
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mt-timeseries/mt_timeseries-{{ version }}.tar.gz
  sha256: 650e0a30113955018d91991066d4c431160b705fa8f3c19c3a12e559592446f4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=45
    - setuptools-scm >=6.2
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - xarray
    - pandas
    - matplotlib-base
    - loguru
    - email-validator
    - mt-metadata >=1.0.0

test:
  imports:
    - mt_timeseries
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}
    - email-validator

about:
  home: https://github.com/kujaku11/mt-timeseries
  summary: RunTS and ChannelTS containers and utilities for magnetotelluric time series
  license: CC0-1.0
  license_file: LICENSE
  dev_url: https://github.com/kujaku11/mt-timeseries

extra:
  recipe-maintainers:
    - kujaku11
