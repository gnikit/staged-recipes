# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  python_min: "3.10"
  version: "0.0.3"

package:
  name: opendataloader-pdf-llamaindex
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/o/opendataloader-pdf-llamaindex/opendataloader_pdf_llamaindex-${{ version }}.tar.gz
  sha256: deec4c4c21c5224c9fdcf22e08364c46e47b96bc5b13034921f751b2be626b83

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - llama-index-core >=0.13.0,<0.15
    - opendataloader-pdf >=2.1.0

tests:
  - python:
      imports:
        - llama_index.readers.opendataloader_pdf
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: LlamaIndex reader for OpenDataLoader PDF — fast, accurate, local PDF extraction
  description: |
    opendataloader-pdf-llamaindex is a LlamaIndex reader that wraps the
    OpenDataLoader PDF engine to parse PDFs into structured Document objects
    for RAG pipelines. It provides accurate reading order, table extraction,
    multiple output formats (text, Markdown, JSON with bounding boxes, HTML),
    per-page document splitting, built-in safety filtering, and fast
    rule-based extraction that runs locally without cloud APIs. Requires
    Java 11+ at runtime (provided transitively via opendataloader-pdf's
    openjdk dependency).
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/opendataloader-project/opendataloader-pdf-llamaindex
  repository: https://github.com/opendataloader-project/opendataloader-pdf-llamaindex

extra:
  recipe-maintainers:
    - killua156
    - mgorny
