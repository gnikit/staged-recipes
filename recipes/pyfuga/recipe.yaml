schema_version: 1

context:
  version: 0.1.0
  python_min: "3.10"

package:
  name: pyfuga
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyfuga/pyfuga-${{ version }}.tar.gz
  sha256: 73cdc26a613fc3283b8f72e93ffa11f9560bbe2ead4d080c30789c26a3ba94ab

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=64
    - wheel
  run:
    - python >=${{ python_min }}
    - numpy >=1.26
    - scipy >=1.10
    - matplotlib-base >=3.10.8
    - xarray >=2025.6.1
    - tqdm >=4.67.3
    - h5netcdf >=1.8.1
    - h5py >=3.15.1
    - numba >=0.63.1

tests:
  - python:
      imports:
        - pyfuga
        - pyfuga.preluts_generator
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true
  - script:
      - python -c "from pyfuga import get_luts"

about:
  homepage: https://gitlab.windenergy.dtu.dk/TOPFARM/PyFuga
  summary: Linearised CFD wake model (PyFuga)
  description: |
    Python implementation of the Fuga linearised CFD wake model and LUT generator.
  license: MIT
  license_file: LICENSE
  documentation: https://topfarm.pages.windenergy.dtu.dk/PyFuga
  repository: https://gitlab.windenergy.dtu.dk/TOPFARM/PyFuga

extra:
  recipe-maintainers:
    - NilsGaukroger
