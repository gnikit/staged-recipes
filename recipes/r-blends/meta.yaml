{% set version = '0.1.1' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-blends
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/blends_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/blends/blends_{{ version }}.tar.gz
  sha256: ed6b0d5263dc523aa51b3817f9b2c8aa233362822c3a73891910d011e03e99e4

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-rlang
    - r-scales
  run:
    - r-base
    - r-rlang
    - r-scales

test:
  commands:
    - $R -e "library('blends')"           # [not win]
    - "\"%R%\" -e \"library('blends')\""  # [win]

about:
  home: https://davidhodge931.github.io/blends/
  dev_url: https://github.com/davidhodge931/blends
  license: MIT
  summary: Colour blend functions. These functions make it easier to blend colours and palettes
    using digital blend modes such as multiply, screen, and overlay.
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
