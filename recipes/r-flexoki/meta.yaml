{% set version = '0.0.2' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-flexoki
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/flexoki_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/flexoki/flexoki_{{ version }}.tar.gz
  sha256: 93e661a72132c54e033547aaa646e386ed094598af2cd1232dbc121e30041524

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-ggplot2
    - r-palette
    - r-scales
  run:
    - r-base
    - r-ggplot2
    - r-palette
    - r-scales

test:
  commands:
    - $R -e "library('flexoki')"           # [not win]
    - "\"%R%\" -e \"library('flexoki')\""  # [win]

about:
  home: https://christophertkenny.com/flexoki/
  dev_url: https://github.com/christopherkenny/flexoki
  license: MIT
  summary: Provides color palettes designed to be reminiscent of text on paper. The color schemes
    were taken from <https://stephango.com/flexoki>. Includes discrete, continuous,
    and binned scales that are not necessarily color-blind friendly. Simple scale and
    theme functions are available for use with 'ggplot2'.
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
