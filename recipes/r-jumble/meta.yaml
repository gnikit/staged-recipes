{% set version = '0.1.1' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-jumble
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/jumble_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/jumble/jumble_{{ version }}.tar.gz
  sha256: 52277baa244ea26f2a4e68dc5e56df6619eb9b9aff70888374fcc7a4c24260c4

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
  run:
    - r-base

test:
  commands:
    - $R -e "library('jumble')"           # [not win]
    - "\"%R%\" -e \"library('jumble')\""  # [win]

about:
  home: https://davidhodge931.github.io/jumble/
  dev_url: https://github.com/davidhodge931/jumble
  license: MIT
  summary: A discrete colour palette. These colours make it easier to create relatively accessible
    and colour-blind safe visualisation.
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
