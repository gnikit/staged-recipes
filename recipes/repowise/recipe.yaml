# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  python_min: "3.11"
  version: "0.9.1"

package:
  name: repowise
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/repowise/repowise-${{ version }}.tar.gz
  sha256: fb46848e0aa2608eb1fb8d6fc7e43ef2d2ac28d0d3d24f45248118cbf22dd373

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - repowise = repowise.cli.main:cli
      - repowise-augment = repowise.cli.augment_hook:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=75
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.27,<1
    - tree_sitter >=0.23,<1
    - tree-sitter-python >=0.23,<1
    - tree-sitter-typescript >=0.23,<1
    - tree-sitter-javascript >=0.23,<1
    - tree-sitter-go >=0.23,<1
    - tree-sitter-rust >=0.23,<1
    - tree-sitter-java >=0.23,<1
    - tree-sitter-cpp >=0.23,<1
    - tree-sitter-kotlin >=1,<2
    - tree-sitter-ruby >=0.23,<1
    - tree-sitter-c-sharp >=0.23,<1
    - tree-sitter-swift >=0.0.1
    - tree-sitter-scala >=0.23,<1
    - tree-sitter-php >=0.23,<1
    - tree-sitter-luau >=1.2,<2
    - networkx >=3.3,<4
    - scipy >=1.11,<2
    - jinja2 >=3.1,<4
    - pathspec >=0.12,<1
    - structlog >=24,<25
    - sqlalchemy >=2.0,<3
    - aiosqlite >=0.20,<1
    - alembic >=1.13,<2
    - pydantic >=2.8,<3
    - tenacity >=9,<10
    - gitpython >=3.1,<4
    - pyyaml >=6.0,<7
    - lancedb >=0.12,<1
    - click >=8.1,<9
    - rich >=13,<14
    - watchdog >=4,<5
    - fastapi >=0.115,<1
    # uvicorn is intentionally omitted here. conda-forge's litellm feedstock
    # has `run_constrained: [uvicorn ==0.33.0]`, but uvicorn 0.33.0 was never
    # built on conda-forge, so any recipe that requires both litellm and a
    # ranged uvicorn becomes unsolvable. Users who run `repowise serve` should
    # install uvicorn separately. Tracked upstream against the litellm
    # feedstock.
    - mcp >=1.0,<2
    - apscheduler >=3.10,<4
    - cryptography >=43,<47
    - anthropic >=0.40,<1
    - openai >=1.50,<3
    - google-genai >=1.0,<2
    - litellm >=1.83.0,<2

tests:
  - python:
      imports:
        - repowise
        - repowise.cli
        - repowise.core
        # repowise.server is omitted because importing it triggers a uvicorn
        # import, and uvicorn is not in run requirements (see comment in
        # `requirements.run`).
      # pip_check is disabled because upstream's wheel METADATA lists
      # uvicorn[standard] as a required dep, but we cannot include uvicorn
      # in run requirements (see the explanatory comment in `requirements.run`).
      pip_check: false
      python_version: ${{ python_min }}.*
  # CLI script tests (`repowise --help` etc.) are intentionally omitted
  # because Click may eagerly load all subcommand modules at startup, which
  # would pull in `serve_cmd` and trigger a uvicorn import — and uvicorn is
  # not available in the test environment (see `requirements.run`).

about:
  summary: Codebase intelligence for developers and AI — generates and maintains a structured wiki for any codebase
  description: |
    repowise is a codebase-intelligence tool that generates and maintains a
    structured wiki for any codebase. It parses source via tree-sitter,
    builds a dependency graph, embeds content into a vector store
    (LanceDB), and exposes both a CLI and a FastAPI / MCP server so
    developers and AI agents can query, search, and reason about a
    repository. Built-in support for multiple LLM providers (Anthropic,
    OpenAI, Google GenAI, LiteLLM).
  license: AGPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/repowise-dev/repowise
  repository: https://github.com/repowise-dev/repowise
  documentation: https://github.com/repowise-dev/repowise/blob/main/docs/USER_GUIDE.md

extra:
  recipe-maintainers:
    - killua156
    - rxm7706
