{% set goname = "github.com/josh/tofu-age-encryption" %}
{% set version = "1.1.1" %}

{% set name = goname.split('/')[-1] %}
{% set pkg_src = ('src/'+goname).replace("/",os.sep) %}

package:
  name: {{ name|lower }}
  version: {{ version|replace("-", "_") }}

source:
  - folder: {{ pkg_src }}
    url: https://{{ goname }}/archive/v{{ version }}.tar.gz
    sha256: 2a6be598cefe32fb155868765aeedf69a9be0fbac007fec327852aba903929c1

build:
  number: 0
  script:
    - pushd {{ pkg_src }}
    - go build -ldflags "-X main.revision=conda-forge" -v -o $PREFIX/bin/tofu-age-encryption  # [not win]
    - go build -ldflags "-X main.revision=conda-forge" -v -o %LIBRARY_BIN%\tofu-age-encryption.exe  # [win]
    - go-licenses save . --save_path ../../../../library_licenses
    # Clear out cache to avoid file not removable warnings
    - chmod -R u+w $(go env GOPATH) && rm -r $(go env GOPATH)  # [unix]

requirements:
  build:
    - {{ compiler("go-nocgo") }}
    - go-licenses

test:
  commands:
    - tofu-age-encryption version

about:
  home: https://github.com/josh/tofu-age-encryption
  summary: Encrypt OpenTofu state data with age encryption keys
  description: |
    OpenTofu encrypts state with a symmetric key derived from a shared passphrase
    that every operator must share and rotate together.
    This project replaces that workflow with age's asymmetric key pairs so operators
    can keep private keys, specify their own recipients,
    and rotate access without redistributing a secret.
  license: MIT
  license_file:
    - {{ pkg_src }}/LICENSE
    - library_licenses/
  doc_url: https://{{ goname }}
  dev_url: https://{{ goname }}

extra:
  recipe-maintainers:
    - brycekbargar
