# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "7.1"
  python_check_max: "3.14"

package:
  name: zope.dottedname
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/z/zope.dottedname/zope_dottedname-${{ version }}.tar.gz
  sha256: b4f5d69c91c6e61a07e95f65f221d4c66de5b10755b8d50df6fc69584df7f3b8

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=78.1.1,<81
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports: zope.dottedname
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*

about:
  summary: Resolver for Python dotted names.
  license: ZPL-2.1 AND BSD-3-Clause
  license_file:
    - LICENSE.txt
    - COPYRIGHT.txt
  homepage: https://pypi.org/project/zope.dottedname
  repository: https://github.com/zopefoundation/zope.dottedname
  documentation: https://zopedottedname.readthedocs.io

extra:
  recipe-maintainers:
    - bollwyvl
